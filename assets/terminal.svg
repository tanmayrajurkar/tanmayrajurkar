<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace">
  <defs>
    <clipPath id="win"><rect width="1200" height="520" rx="16"/></clipPath>
    <clipPath id="t1"><rect x="44" y="80" width="0" height="32"><animate attributeName="width" from="0" to="150" dur="0.6s" begin="0.4s" fill="freeze"/></rect></clipPath>
    <clipPath id="t2"><rect x="44" y="175" width="0" height="32"><animate attributeName="width" from="0" to="230" dur="0.6s" begin="2.0s" fill="freeze"/></rect></clipPath>
    <clipPath id="t3"><rect x="44" y="270" width="0" height="32"><animate attributeName="width" from="0" to="260" dur="0.6s" begin="3.6s" fill="freeze"/></rect></clipPath>
    <clipPath id="t4"><rect x="44" y="365" width="0" height="32"><animate attributeName="width" from="0" to="230" dur="0.6s" begin="5.2s" fill="freeze"/></rect></clipPath>
  </defs>

  <g clip-path="url(#win)">
    <rect width="1200" height="520" rx="16" fill="#0d1117"/>
    <rect width="1200" height="48" fill="#161b22"/>
    <circle cx="28" cy="24" r="7" fill="#ff5f56"/>
    <circle cx="52" cy="24" r="7" fill="#ffbd2e"/>
    <circle cx="76" cy="24" r="7" fill="#27c93f"/>
    <text x="600" y="30" text-anchor="middle" font-size="15" fill="#8b949e">tanmay@github: ~/profile</text>

    <!-- $ whoami -->
    <g clip-path="url(#t1)">
      <text x="44" y="103" font-size="20"><tspan fill="#2EE6A8">$</tspan><tspan fill="#E6EDF3" dx="12">whoami</tspan></text>
    </g>
    <text x="44" y="143" font-size="19" fill="#8b949e" opacity="0">tanmay rajurkar &#183; engineer &#215; product manager &#183; integrated m.tech @ vit-ap (4th year)
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.2s" fill="freeze"/>
    </text>

    <!-- $ ls ./trophies -->
    <g clip-path="url(#t2)">
      <text x="44" y="198" font-size="20"><tspan fill="#2EE6A8">$</tspan><tspan fill="#E6EDF3" dx="12">ls ./trophies</tspan></text>
    </g>
    <text x="44" y="238" font-size="19" opacity="0"><tspan fill="#FBBC04">sih-2025</tspan><tspan fill="#8b949e" dx="10">&#127942;</tspan><tspan fill="#FBBC04" dx="28">sih-2024</tspan><tspan fill="#8b949e" dx="10">&#127942;</tspan><tspan fill="#c9d1d9" dx="28">post-a-thon</tspan><tspan fill="#8b949e" dx="10">&#129351;</tspan><tspan fill="#c9d1d9" dx="28">google-dev-sprint</tspan><tspan fill="#8b949e" dx="10">&#129352;</tspan><tspan fill="#c9d1d9" dx="28">eureka-iit-b</tspan>
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="2.8s" fill="freeze"/>
    </text>

    <!-- $ cat mission.txt -->
    <g clip-path="url(#t3)">
      <text x="44" y="293" font-size="20"><tspan fill="#2EE6A8">$</tspan><tspan fill="#E6EDF3" dx="12">cat mission.txt</tspan></text>
    </g>
    <text x="44" y="333" font-size="19" opacity="0"><tspan fill="#36BCF7">"AI as a means, not an end."</tspan><tspan fill="#8b949e" dx="14">&#183; talk to users &#183; ship 0&#8594;1 &#183; measure everything</tspan>
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="4.4s" fill="freeze"/>
    </text>

    <!-- $ ./ship next -->
    <g clip-path="url(#t4)">
      <text x="44" y="388" font-size="20"><tspan fill="#2EE6A8">$</tspan><tspan fill="#E6EDF3" dx="12">./ship --next</tspan></text>
    </g>
    <text x="44" y="428" font-size="19" opacity="0"><tspan fill="#2EE6A8">&#8594;</tspan><tspan fill="#8b949e" dx="12">gsoc 2026 &#183; modernizing ocean-model validation tooling for</tspan><tspan fill="#36BCF7" dx="8">NOAA / IOOS</tspan>
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="6.0s" fill="freeze"/>
    </text>

    <!-- idle prompt -->
    <text x="44" y="483" font-size="20" fill="#2EE6A8" opacity="0">$
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="6.6s" fill="freeze"/>
    </text>
    <rect x="70" y="465" width="12" height="24" fill="#2EE6A8" opacity="0">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" begin="6.7s" repeatCount="indefinite"/>
    </rect>

    <rect x="0.5" y="0.5" width="1199" height="519" rx="15.5" stroke="#21262d"/>
  </g>
</svg>
